name: Agent Deploy

on:
  push:
    branches: [main]
    paths:
      - 'overlays/**'
      - 'personas/**'
      - 'base/**'
      - 'overlay-map.yaml'
      - '.github/workflows/agent-deploy.yml'
  workflow_dispatch:
    inputs:
      overlay:
        description: 'Overlay to deploy (e.g. openai, anthropic, groq, ollama-local). Leave empty for all.'
        required: false
        type: string
      action:
        description: 'Action: deploy or teardown'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - teardown

env:
  HERMES_IMAGE: nousresearch/hermes-agent:latest

jobs:
  # ============================================
  # Sync personas → overlays & detect changes
  # ============================================
  sync-and-detect:
    runs-on: ubuntu-latest
    outputs:
      overlays: ${{ steps.detect.outputs.overlays }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync persona files to overlays
        run: |
          # Read overlay-map.yaml and copy persona -> overlay/SOUL.md
          echo "Syncing personas to overlays..."
          while IFS=':' read -r overlay persona; do
            # Skip comments and blank lines
            overlay=$(echo "$overlay" | xargs)
            persona=$(echo "$persona" | xargs)
            [ -z "$overlay" ] && continue
            [ -z "$persona" ] && continue
            [[ "$overlay" == \#* ]] && continue

            if [ -f "personas/$persona" ] && [ -d "overlays/$overlay" ]; then
              cp "personas/$persona" "overlays/$overlay/SOUL.md"
              echo "  personas/$persona → overlays/$overlay/SOUL.md"
            else
              echo "  WARNING: personas/$persona or overlays/$overlay not found, skipping"
            fi
          done < overlay-map.yaml

      - name: Commit synced personas (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet overlays/*/SOUL.md && echo "No persona changes to commit" && exit 0
          git add overlays/*/SOUL.md
          git commit -m "chore: sync persona files to overlays [skip ci]"
          git push

      - name: Detect changed overlays
        id: detect
        run: |
          # Manual dispatch: use specified overlay (or all)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.overlay }}" ]; then
              echo "overlays=[\"${{ inputs.overlay }}\"]" >> $GITHUB_OUTPUT
            else
              OVERLAYS=$(ls -d overlays/*/ | xargs -n1 basename | jq -R . | jq -s .)
              echo "overlays=$OVERLAYS" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Push to main: detect changed overlays
          CHANGED=""

          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # Always rebuild all overlays if base/ or workflow changed
          if echo "$CHANGED_FILES" | grep -qE "^base/|^\.github/workflows/"; then
            OVERLAYS=$(ls -d overlays/*/ | xargs -n1 basename | jq -R . | jq -s .)
            echo "overlays=$OVERLAYS" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If overlay-map.yaml or personas/ changed, rebuild all mapped overlays
          if echo "$CHANGED_FILES" | grep -qE "^overlay-map\.yaml|^personas/"; then
            # Rebuild all overlays that map to a changed persona
            while IFS=':' read -r overlay persona; do
              overlay=$(echo "$overlay" | xargs)
              persona=$(echo "$persona" | xargs)
              [ -z "$overlay" ] || [ -z "$persona" ] && continue
              [[ "$overlay" == \#* ]] && continue
              # Check if this persona file changed
              if echo "$CHANGED_FILES" | grep -q "personas/$persona"; then
                CHANGED="$overlay $CHANGED"
              fi
            done < overlay-map.yaml
          fi

          # Check which overlay directories changed
          for overlay_dir in overlays/*/; do
            name=$(basename "$overlay_dir")
            if echo "$CHANGED_FILES" | grep -q "^overlays/$name/"; then
              # Don't add twice
              echo "$CHANGED" | grep -qw "$name" || CHANGED="$name $CHANGED"
            fi
          done

          if [ -z "$CHANGED" ]; then
            echo "overlays=[]" >> $GITHUB_OUTPUT
          else
            OVERLAYS=$(echo $CHANGED | tr ' ' '\n' | sort -u | jq -R . | jq -s .)
            echo "overlays=$OVERLAYS" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # Validate kustomize overlays
  # ============================================
  validate:
    runs-on: ubuntu-latest
    needs: sync-and-detect
    if: needs.sync-and-detect.outputs.overlays != '[]'
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.sync-and-detect.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync personas (same as previous job)
        run: |
          while IFS=':' read -r overlay persona; do
            overlay=$(echo "$overlay" | xargs)
            persona=$(echo "$persona" | xargs)
            [ -z "$overlay" ] || [ -z "$persona" ] && continue
            [[ "$overlay" == \#* ]] && continue
            [ -f "personas/$persona" ] && [ -d "overlays/$overlay" ] && \
              cp "personas/$persona" "overlays/$overlay/SOUL.md"
          done < overlay-map.yaml

      - name: Validate kustomize build
        run: |
          echo "Validating overlay: ${{ matrix.overlay }}"
          kubectl kustomize overlays/${{ matrix.overlay }} > /dev/null

      - name: Validate SOUL.md exists and has content
        run: |
          if [ ! -f "overlays/${{ matrix.overlay }}/SOUL.md" ]; then
            echo "Error: overlays/${{ matrix.overlay }}/SOUL.md not found"
            exit 1
          fi
          LINES=$(wc -l < "overlays/${{ matrix.overlay }}/SOUL.md")
          echo "SOUL.md found ($LINES lines)"
          if [ "$LINES" -lt 5 ]; then
            echo "Warning: SOUL.md seems too short ($LINES lines). Expected a full persona definition."
          fi

  # ============================================
  # Deploy overlay to k3s
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: [sync-and-detect, validate]
    if: >
      needs.sync-and-detect.outputs.overlays != '[]' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.sync-and-detect.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync personas (same as previous jobs)
        run: |
          while IFS=':' read -r overlay persona; do
            overlay=$(echo "$overlay" | xargs)
            persona=$(echo "$persona" | xargs)
            [ -z "$overlay" ] || [ -z "$persona" ] && continue
            [[ "$overlay" == \#* ]] && continue
            [ -f "personas/$persona" ] && [ -d "overlays/$overlay" ] && \
              cp "personas/$persona" "overlays/$overlay/SOUL.md"
          done < overlay-map.yaml

      - name: Extract namespace from overlay
        id: ns
        run: |
          NAMESPACE=$(grep 'namespace:' overlays/${{ matrix.overlay }}/kustomization.yaml | awk '{print $2}')
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Extract model from overlay
        id: model
        run: |
          # Find the HERMES_MODEL env value from the kustomization patch
          MODEL=$(grep -A5 'spec/template/spec/containers/0/env/5/value' \
            overlays/${{ matrix.overlay }}/kustomization.yaml | grep 'value' | tail -1 | awk '{print $2}')
          echo "model=${MODEL:-unknown}" >> $GITHUB_OUTPUT

      - name: Generate API Server Key
        id: api-key
        run: |
          API_KEY=$(openssl rand -hex 32)
          echo "key=$API_KEY" >> $GITHUB_OUTPUT
          echo "::add-mask::$API_KEY"

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: '--accept-routes --accept-dns'

      - name: Setup kubectl
        uses: azure/k8s-set-context@v1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Apply kustomize overlay
        run: |
          kubectl apply -k overlays/${{ matrix.overlay }}

      - name: Create/Update secrets
        env:
          API_SERVER_KEY: ${{ steps.api-key.outputs.key }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY || '' }}
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          # Delete existing secret to start fresh (handles key rotation)
          kubectl delete secret hermes-secrets -n "$NS" --ignore-not-found=true

          # Build secret from available keys
          ARGS="--namespace=$NS --from-literal=API_SERVER_KEY=$API_SERVER_KEY"
          [ -n "$OPENAI_API_KEY" ] && ARGS="$ARGS --from-literal=OPENAI_API_KEY=$OPENAI_API_KEY"
          [ -n "$ANTHROPIC_API_KEY" ] && ARGS="$ARGS --from-literal=ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
          [ -n "$GROQ_API_KEY" ] && ARGS="$ARGS --from-literal=GROQ_API_KEY=$GROQ_API_KEY"
          [ -n "$OLLAMA_API_KEY" ] && ARGS="$ARGS --from-literal=OLLAMA_API_KEY=$OLLAMA_API_KEY"

          kubectl create secret generic hermes-secrets $ARGS

      - name: Restart deployment to pick up new config
        run: |
          kubectl rollout restart deployment/hermes -n ${{ steps.ns.outputs.namespace }}

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/hermes \
            -n ${{ steps.ns.outputs.namespace }} \
            --timeout=3m

      - name: Print access info
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          echo "## 🚀 Agent deployed: ${{ matrix.overlay }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Overlay | \`${{ matrix.overlay }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`$NS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Model | \`${{ steps.model.outputs.model }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Persona | \`(see SOUL.md)\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Connect" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl port-forward svc/hermes 8642:8642 -n $NS" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Teardown overlay from k3s
  # ============================================
  teardown:
    runs-on: ubuntu-latest
    needs: sync-and-detect
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'teardown'
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.sync-and-detect.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract namespace from overlay
        id: ns
        run: |
          NAMESPACE=$(grep 'namespace:' overlays/${{ matrix.overlay }}/kustomization.yaml | awk '{print $2}')
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: '--accept-routes --accept-dns'

      - name: Setup kubectl
        uses: azure/k8s-set-context@v1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Delete namespace
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          echo "🗑️ Tearing down ${{ matrix.overlay }} (namespace: $NS)"
          kubectl delete namespace "$NS" --wait=true

      - name: Confirm deletion
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          if kubectl get namespace "$NS" &>/dev/null; then
            echo "::error::Namespace $NS still exists"
            exit 1
          else
            echo "✅ Namespace $NS deleted"
          fi

      - name: Print summary
        run: |
          echo "## 🗑️ Agent removed: ${{ matrix.overlay }}" >> $GITHUB_STEP_SUMMARY
          echo "Namespace \`${{ steps.ns.outputs.namespace }}\` deleted." >> $GITHUB_STEP_SUMMARY