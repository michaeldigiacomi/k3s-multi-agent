apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hermes
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: bootstrap-tools
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              KUBE_VERSION="v1.32.0"
              apt-get update -qq && apt-get install -y -qq curl ca-certificates
              mkdir -p /opt/data/bin /opt/data/tools/bin /opt/data/tools/lib/x86_64-linux-gnu
              # Install kubectl (pinned version, verify checksum)
              if [ ! -f /opt/data/bin/kubectl ]; then
                curl -fsSL "https://dl.k8s.io/release/${KUBE_VERSION}/bin/linux/amd64/kubectl" -o /opt/data/bin/kubectl
                curl -fsSL "https://dl.k8s.io/release/${KUBE_VERSION}/bin/linux/amd64/kubectl.sha256" -o /tmp/kubectl.sha256
                echo "$(cat /tmp/kubectl.sha256)  /opt/data/bin/kubectl" | sha256sum -c -
                chmod +x /opt/data/bin/kubectl
              fi
              # Copy curl + shared libs to persistent storage
              cp /usr/bin/curl /opt/data/tools/bin/curl
              ldd /usr/bin/curl | grep -o '/[^ ]*' | while read lib; do
                cp "$lib" /opt/data/tools/lib/x86_64-linux-gnu/ 2>/dev/null || true
              done
              # Bootstrap pip into persistent volume
              if [ ! -f /opt/data/local/bin/pip3 ]; then
                curl -fsSL https://bootstrap.pypa.io/get-pip.py | python3 - --prefix /opt/data
              fi
              chown -R 10000:10000 /opt/data/bin /opt/data/local /opt/data/tools 2>/dev/null || true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
        - name: inject-soul
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Injecting SOUL.md persona..."
              if [ -f /soul-source/SOUL.md ]; then
                cp /soul-source/SOUL.md /opt/data/SOUL.md
                echo "SOUL.md injected successfully."
                echo "--- Persona preview ---"
                head -5 /opt/data/SOUL.md
                echo "..."
              else
                echo "WARNING: No SOUL.md found in ConfigMap. Agent will use default persona."
              fi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: soul-volume
              mountPath: /soul-source
              readOnly: true
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: http
            - containerPort: 8080
              name: metrics
          startupProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: PATH
              value: /opt/data/tools/bin:/opt/data/bin:/opt/data/local/bin:/home/hermes/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: LD_LIBRARY_PATH
              value: /opt/data/tools/lib/x86_64-linux-gnu
            - name: PYTHONPATH
              value: /opt/data/local/lib/python3.13/dist-packages
            - name: HERMES_INFERENCE_PROVIDER
              value: custom
            - name: OPENAI_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434/v1
            - name: HERMES_MODEL
              value: glm-5.1:cloud
            - name: OLLAMA_HOST
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: API_SERVER_KEY
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: OLLAMA_API_KEY
                  optional: true
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: DISCORD_BOT_TOKEN
                  optional: true
            - name: DISCORD_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: DISCORD_ALLOWED_USERS
                  optional: true
            - name: DISCORD_HOME_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: DISCORD_HOME_CHANNEL
                  optional: true
          envFrom:
            - secretRef:
                name: hermes-secrets
                optional: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data-pvc
        - name: soul-volume
          configMap:
            name: hermes-soul
