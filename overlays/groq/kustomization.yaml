apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: hermes-groq

commonLabels:
  k3s-multi-agent.io/overlay: groq
  k3s-multi-agent.io/provider: groq
  k3s-multi-agent.io/persona: devops

# DevOps persona — change SOUL.md in this directory to swap persona
configMapGenerator:
  - name: hermes-soul
    behavior: replace
    files:
      - SOUL.md

patches:
  - target:
      kind: Deployment
      name: hermes
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hermes
      spec:
        template:
          spec:
            containers:
              - name: hermes
                env:
                  - name: HERMES_INFERENCE_PROVIDER
                    value: custom
                  - name: OPENAI_BASE_URL
                    value: https://api.groq.com/openai/v1
                  - name: HERMES_MODEL
                    value: llama-3.3-70b-versatile
