# Agent CI/CD Design Notes
#
# This repo doesn't build Docker images — Hermes images are pre-built at
# nousresearch/hermes-agent:latest. Instead, the CI/CD pipeline orchestrates:
#
# 1. Validation: Verify kustomize overlays render correctly
# 2. Secrets: Create/update Kubernetes secrets (API keys are NOT in git)
# 3. Deployment: Apply kustomize overlays to create/update agent namespaces
# 4. Teardown: Destroy agent namespaces on branch deletion or manual trigger
#
# Trigger model:
#   - Push to main → deploy all changed overlays
#   - Push to branch overlays/* → deploy that overlay as a preview (-staging suffix)
#   - Manual dispatch → deploy/teardown specific overlay
#   - Branch deletion → teardown preview instances
#
# Secrets management:
#   API keys are stored as GitHub repo secrets (one per provider):
#     OPENAI_API_KEY, ANTHROPIC_API_KEY, GROQ_API_KEY
#   The workflow injects them into k8s secrets at deploy time.
#   API_SERVER_KEY is auto-generated per namespace.
#
# Persona changes:
#   Since SOUL.md files live in git, any change to personas/ or overlays/*/SOUL.md
#   triggers a redeploy of affected overlays with the updated persona.

name: Agent Deploy

on:
  push:
    branches: [main]
    paths:
      - 'overlays/**'
      - 'personas/**'
      - 'base/**'
      - '.github/workflows/agent-deploy.yml'
  workflow_dispatch:
    inputs:
      overlay:
        description: 'Overlay to deploy (e.g. openai, anthropic, groq, ollama-local)'
        required: false
        type: string
      action:
        description: 'Action: deploy or teardown'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - teardown

env:
  REGISTRY: ghcr.io
  HERMES_IMAGE: nousresearch/hermes-agent:latest

jobs:
  # ============================================
  # Detect which overlays changed
  # ============================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      overlays: ${{ steps.set.outputs.overlays }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed overlays
        id: set
        run: |
          # Manual dispatch: use specified overlay
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.overlay }}" ]; then
              echo "overlays=[\"${{ inputs.overlay }}\"]" >> $GITHUB_OUTPUT
            else
              # No overlay specified = deploy all
              OVERLAYS=$(ls -d overlays/*/ | xargs -n1 basename | jq -R . | jq -s .)
              echo "overlays=$OVERLAYS" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Push to main: detect which overlays changed
          CHANGED=""
          for overlay in overlays/*/; do
            name=$(basename "$overlay")
            # Check if any file in this overlay, personas/, or base/ changed
            if git diff --name-only HEAD~1 HEAD -- \
              "overlays/$name/" "personas/" "base/" ".github/workflows/agent-deploy.yml" | grep -q .; then
              CHANGED="$name $CHANGED"
            fi
          done

          if [ -z "$CHANGED" ]; then
            echo "overlays=[]" >> $GITHUB_OUTPUT
          else
            OVERLAYS=$(echo $CHANGED | tr ' ' '\n' | jq -R . | jq -s .)
            echo "overlays=$OVERLAYS" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # Validate kustomize overlays
  # ============================================
  validate:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.overlays != '[]'
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.detect-changes.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate kustomize build
        run: |
          echo "Validating overlay: ${{ matrix.overlay }}"
          kubectl kustomize overlays/${{ matrix.overlay }} > /dev/null

      - name: Validate SOUL.md exists
        run: |
          if [ ! -f "overlays/${{ matrix.overlay }}/SOUL.md" ]; then
            echo "Error: overlays/${{ matrix.overlay }}/SOUL.md not found"
            exit 1
          fi
          echo "SOUL.md found ($(wc -l < overlays/${{ matrix.overlay }}/SOUL.md) lines)"

  # ============================================
  # Deploy overlay to k3s
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    if: >
      needs.detect-changes.outputs.overlays != '[]' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.detect-changes.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract namespace from overlay
        id: ns
        run: |
          NAMESPACE=$(grep 'namespace:' overlays/${{ matrix.overlay }}/kustomization.yaml | awk '{print $2}')
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Generate API Server Key
        id: api-key
        run: |
          API_KEY=$(openssl rand -hex 32)
          echo "key=$API_KEY" >> $GITHUB_OUTPUT
          # Mask it from logs
          echo "::add-mask::$API_KEY"

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: '--accept-routes --accept-dns'

      - name: Setup kubectl
        uses: azure/k8s-set-context@v1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Apply kustomize overlay
        run: |
          kubectl apply -k overlays/${{ matrix.overlay }}

      - name: Create/Update secrets
        env:
          API_SERVER_KEY: ${{ steps.api-key.outputs.key }}
          # Provider-specific keys — only set non-empty values
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY || '' }}
        run: |
          # Delete existing secret to start fresh (handles key rotation)
          kubectl delete secret hermes-secrets -n ${{ steps.ns.outputs.namespace }} --ignore-not-found=true

          # Build the secret from available keys
          SECRET_ARGS="--namespace=${{ steps.ns.outputs.namespace }}"
          SECRET_ARGS="$SECRET_ARGS --from-literal=API_SERVER_KEY=$API_SERVER_KEY"

          # Only add provider keys that are set
          [ -n "$OPENAI_API_KEY" ] && SECRET_ARGS="$SECRET_ARGS --from-literal=OPENAI_API_KEY=$OPENAI_API_KEY"
          [ -n "$ANTHROPIC_API_KEY" ] && SECRET_ARGS="$SECRET_ARGS --from-literal=ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
          [ -n "$GROQ_API_KEY" ] && SECRET_ARGS="$SECRET_ARGS --from-literal=GROQ_API_KEY=$GROQ_API_KEY"
          [ -n "$OLLAMA_API_KEY" ] && SECRET_ARGS="$SECRET_ARGS --from-literal=OLLAMA_API_KEY=$OLLAMA_API_KEY"

          kubectl create secret generic hermes-secrets $SECRET_ARGS

      - name: Restart deployment to pick up new config
        run: |
          kubectl rollout restart deployment/hermes -n ${{ steps.ns.outputs.namespace }}

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/hermes \
            -n ${{ steps.ns.outputs.namespace }} \
            --timeout=3m

      - name: Print access info
        run: |
          echo "============================================"
          echo "  Agent deployed: ${{ matrix.overlay }}"
          echo "  Namespace: ${{ steps.ns.outputs.namespace }}"
          echo "============================================"
          echo ""
          echo "  Port-forward:"
          echo "    kubectl port-forward svc/hermes 8642:8642 -n ${{ steps.ns.outputs.namespace }}"
          echo ""
          echo "  Test:"
          echo "    curl http://localhost:8642/v1/chat/completions \\"
          echo "      -H 'Authorization: Bearer <API_SERVER_KEY>' \\"
          echo "      -H 'Content-Type: application/json' \\"
          echo "      -d '{\"model\":\"<model>\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}]}'"

  # ============================================
  # Teardown overlay from k3s
  # ============================================
  teardown:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'teardown'
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.detect-changes.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract namespace from overlay
        id: ns
        run: |
          NAMESPACE=$(grep 'namespace:' overlays/${{ matrix.overlay }}/kustomization.yaml | awk '{print $2}')
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: '--accept-routes --accept-dns'

      - name: Setup kubectl
        uses: azure/k8s-set-context@v1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Delete namespace
        run: |
          echo "Tearing down ${{ matrix.overlay }} (namespace: ${{ steps.ns.outputs.namespace }})"
          kubectl delete namespace ${{ steps.ns.outputs.namespace }} --wait=true
          echo "Namespace deleted."

      - name: Confirm deletion
        run: |
          if kubectl get namespace ${{ steps.ns.outputs.namespace }} &>/dev/null; then
            echo "WARNING: Namespace still exists"
            exit 1
          else
            echo "Confirmed: namespace ${{ steps.ns.outputs.namespace }} deleted"
          fi