apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: hermes-ollama-local

# SRE persona — change SOUL.md in this directory to swap persona
configMapGenerator:
  - name: hermes-soul
    behavior: replace
    files:
      - SOUL.md

patches:
  - target:
      kind: Deployment
      name: hermes
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: custom
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: http://ollama.ollama.svc.cluster.local:11434/v1
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: llama3.1:8b