apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Point to base
resources:
  - ../../base

# Override namespace — all resources land in hermes-openai
namespace: hermes-openai

# Patch the deployment to use OpenAI as inference provider
patches:
  - target:
      kind: Deployment
      name: hermes
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value  # HERMES_INFERENCE_PROVIDER
        value: openai
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value  # OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value  # HERMES_MODEL
        value: gpt-4o