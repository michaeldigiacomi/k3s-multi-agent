apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: hermes-infred

commonLabels:
  k3s-multi-agent.io/overlay: infred
  k3s-multi-agent.io/provider: ollama
  k3s-multi-agent.io/persona: infred

# Infred — Infrastructure Architect persona
configMapGenerator:
  - name: hermes-soul
    behavior: replace
    files:
      - SOUL.md

patches:
  - target:
      kind: Deployment
      name: hermes
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hermes
      spec:
        template:
          spec:
            initContainers:
              - name: inject-config
                image: busybox:1.36
                imagePullPolicy: IfNotPresent
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    echo "Patching config.yaml model settings..."
                    CFG="/opt/data/config.yaml"
                    if [ -f "$CFG" ]; then
                      sed -i 's/^[[:space:]]*default:.*/  default: "glm-5.1:cloud"/' "$CFG"
                      sed -i 's/^[[:space:]]*provider:.*/  provider: "custom"/' "$CFG"
                      sed -i 's|^[[:space:]]*base_url:.*|  base_url: "http://ollama.ollama.svc.cluster.local:11434/v1"|' "$CFG"
                      echo "config.yaml patched successfully."
                      grep -E 'default:|provider:|base_url:' "$CFG" | head -5
                    else
                      echo "WARNING: $CFG not found, skipping patch."
                    fi
                volumeMounts:
                  - name: hermes-data
                    mountPath: /opt/data
            containers:
              - name: hermes
                env:
                  - name: HERMES_INFERENCE_PROVIDER
                    value: custom
                  - name: OPENAI_BASE_URL
                    value: http://ollama.ollama.svc.cluster.local:11434/v1
                  - name: HERMES_MODEL
                    value: glm-5.1:cloud
