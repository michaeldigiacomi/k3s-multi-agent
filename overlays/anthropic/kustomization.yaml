apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: hermes-anthropic

commonLabels:
  k3s-multi-agent.io/overlay: anthropic
  k3s-multi-agent.io/provider: anthropic
  k3s-multi-agent.io/persona: security

# Security persona — change SOUL.md in this directory to swap persona
configMapGenerator:
  - name: hermes-soul
    behavior: replace
    files:
      - SOUL.md

patches:
  - target:
      kind: Deployment
      name: hermes
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hermes
      spec:
        template:
          spec:
            containers:
              - name: hermes
                env:
                  - name: HERMES_INFERENCE_PROVIDER
                    value: anthropic
                  - name: OPENAI_BASE_URL
                    value: https://api.anthropic.com/v1
                  - name: HERMES_MODEL
                    value: claude-sonnet-4
