apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: hermes-openai

commonLabels:
  k3s-multi-agent.io/overlay: openai
  k3s-multi-agent.io/provider: openai
  k3s-multi-agent.io/persona: default

# Default persona — change SOUL.md in this directory to swap persona
configMapGenerator:
  - name: hermes-soul
    behavior: replace
    files:
      - SOUL.md

patches:
  - target:
      kind: Deployment
      name: hermes
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hermes
      spec:
        template:
          spec:
            containers:
              - name: hermes
                env:
                  - name: HERMES_INFERENCE_PROVIDER
                    value: openai
                  - name: OPENAI_BASE_URL
                    value: https://api.openai.com/v1
                  - name: HERMES_MODEL
                    value: gpt-4o
