apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: hermes-anthropic

patches:
  - target:
      kind: Deployment
      name: hermes
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value  # HERMES_INFERENCE_PROVIDER
        value: anthropic
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value  # OPENAI_BASE_URL
        value: https://api.anthropic.com/v1
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value  # HERMES_MODEL
        value: claude-sonnet-4