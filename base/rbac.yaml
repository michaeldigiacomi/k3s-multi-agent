apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events", "persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hermes
subjects:
  - kind: ServiceAccount
    name: hermes
