name: Agent Deploy

on:
  push:
    branches: [main]
    paths:
      - 'overlays/**'
      - 'personas/**'
      - 'base/**'
      - 'overlay-map.yaml'
      - '.github/workflows/agent-deploy.yml'
  workflow_dispatch:
    inputs:
      overlay:
        description: 'Overlay to deploy (e.g. openai, anthropic, groq, ollama-local). Leave empty for all.'
        required: false
        type: string
      action:
        description: 'Action: deploy or teardown'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - teardown

env:
  HERMES_IMAGE: nousresearch/hermes-agent:latest

jobs:
  # ============================================
  # Detect changed overlays BEFORE any commit
  # ============================================
  detect:
    runs-on: ubuntu-latest
    outputs:
      overlays: ${{ steps.detect.outputs.overlays }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed overlays
        id: detect
        run: |
          # Capture the original push commit range before any local modifications
          ORIGINAL_HEAD=$(git rev-parse HEAD)
          PARENT_HEAD=$(git rev-parse HEAD~1)
          echo "Comparing $PARENT_HEAD..$ORIGINAL_HEAD"

          # Manual dispatch: use specified overlay (or all)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.overlay }}" ]; then
              echo "overlays=[\"${{ inputs.overlay }}\"]" >> $GITHUB_OUTPUT
            else
              OVERLAYS=$(find overlays -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | jq -R . | jq -s .)
              echo "overlays=$OVERLAYS" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Push to main: detect changed files in the original commit
          CHANGED_FILES=$(git diff --name-only "$PARENT_HEAD" "$ORIGINAL_HEAD")
          CHANGED=""

          # Always rebuild all overlays if base/ or workflow changed
          if echo "$CHANGED_FILES" | grep -qE "^base/|^\.github/workflows/"; then
            OVERLAYS=$(find overlays -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | jq -R . | jq -s .)
            echo "overlays=$OVERLAYS" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If overlay-map.yaml or personas/ changed, rebuild affected overlays
          if echo "$CHANGED_FILES" | grep -qE "^overlay-map\.yaml|^personas/"; then
            while IFS=':' read -r overlay persona; do
              overlay=$(echo "$overlay" | xargs)
              persona=$(echo "$persona" | xargs)
              [ -z "$overlay" ] || [ -z "$persona" ] && continue
              [[ "$overlay" == \#* ]] && continue
              if echo "$CHANGED_FILES" | grep -q "personas/$persona"; then
                CHANGED="$overlay $CHANGED"
              fi
            done < overlay-map.yaml
          fi

          # Check which overlay directories changed
          for overlay_dir in overlays/*/; do
            [[ "$overlay_dir" == *".DS_Store"* ]] && continue
            name=$(basename "$overlay_dir")
            if echo "$CHANGED_FILES" | grep -q "^overlays/$name/"; then
              echo "$CHANGED" | grep -qw "$name" || CHANGED="$name $CHANGED"
            fi
          done

          if [ -z "$CHANGED" ]; then
            echo "overlays=[]" >> $GITHUB_OUTPUT
          else
            OVERLAYS=$(echo $CHANGED | tr ' ' '\n' | sort -u | jq -R . | jq -s .)
            echo "overlays=$OVERLAYS" >> $GITHUB_OUTPUT
          fi

      - name: Sync persona files to overlays
        run: |
          ./scripts/sync-personas.sh --commit

  # ============================================
  # Validate kustomize overlays
  # ============================================
  validate:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.overlays != '[]'
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.detect.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync personas
        run: |
          ./scripts/sync-personas.sh

      - name: Validate kustomize build
        run: |
          echo "Validating overlay: ${{ matrix.overlay }}"
          kubectl kustomize overlays/${{ matrix.overlay }} > /dev/null

      - name: Validate SOUL.md exists and has content
        run: |
          if [ ! -f "overlays/${{ matrix.overlay }}/SOUL.md" ]; then
            echo "Error: overlays/${{ matrix.overlay }}/SOUL.md not found"
            exit 1
          fi
          LINES=$(wc -l < "overlays/${{ matrix.overlay }}/SOUL.md")
          echo "SOUL.md found ($LINES lines)"
          if [ "$LINES" -lt 5 ]; then
            echo "Warning: SOUL.md seems too short ($LINES lines). Expected a full persona definition."
          fi

  # ============================================
  # Deploy overlay to k3s
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: [detect, validate]
    if: >
      needs.detect.outputs.overlays != '[]' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.detect.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync personas
        run: |
          ./scripts/sync-personas.sh

      - name: Extract namespace from overlay
        id: ns
        run: |
          NAMESPACE=$(grep '^namespace:' overlays/${{ matrix.overlay }}/kustomization.yaml | awk '{print $2}')
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Extract model from overlay
        id: model
        run: |
          MODEL=$(grep -A2 'name: HERMES_MODEL' overlays/${{ matrix.overlay }}/kustomization.yaml | grep 'value:' | awk '{print $2}')
          echo "model=${MODEL:-unknown}" >> $GITHUB_OUTPUT

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: '--accept-routes --accept-dns'

      - name: Setup kubectl
        uses: azure/k8s-set-context@v1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Reuse or generate API Server Key
        id: api-key
        env:
          NS: ${{ steps.ns.outputs.namespace }}
        run: |
          # Try to reuse existing key so we don't break existing clients
          EXISTING_KEY=$(kubectl get secret hermes-secrets -n "$NS" -o jsonpath='{.data.API_SERVER_KEY}' 2>/dev/null | base64 -d || true)
          if [ -n "$EXISTING_KEY" ]; then
            echo "Reusing existing API_SERVER_KEY from namespace $NS"
            echo "key=$EXISTING_KEY" >> $GITHUB_OUTPUT
            echo "::add-mask::$EXISTING_KEY"
          else
            API_KEY=$(openssl rand -hex 32)
            echo "Generated new API_SERVER_KEY for namespace $NS"
            echo "key=$API_KEY" >> $GITHUB_OUTPUT
            echo "::add-mask::$API_KEY"
          fi

      - name: Apply kustomize overlay
        run: |
          kubectl apply -k overlays/${{ matrix.overlay }}

      - name: Apply secrets
        env:
          NS: ${{ steps.ns.outputs.namespace }}
          API_SERVER_KEY: ${{ steps.api-key.outputs.key }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY || '' }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN || '' }}
          DISCORD_ALLOWED_USERS: ${{ secrets.DISCORD_ALLOWED_USERS || '' }}
          DISCORD_HOME_CHANNEL: ${{ secrets.DISCORD_HOME_CHANNEL || '' }}
        run: |
          # Build a temporary secret manifest and apply it (idempotent, no delete)
          cat > /tmp/hermes-secrets.yaml <<SECRET_EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: hermes-secrets
            namespace: ${NS}
          type: Opaque
          stringData:
            API_SERVER_KEY: ${API_SERVER_KEY}
          SECRET_EOF

          if [ -n "$OPENAI_API_KEY" ]; then
            echo "  OPENAI_API_KEY: ${OPENAI_API_KEY}" >> /tmp/hermes-secrets.yaml
          fi
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}" >> /tmp/hermes-secrets.yaml
          fi
          if [ -n "$GROQ_API_KEY" ]; then
            echo "  GROQ_API_KEY: ${GROQ_API_KEY}" >> /tmp/hermes-secrets.yaml
          fi
          if [ -n "$OLLAMA_API_KEY" ]; then
            echo "  OLLAMA_API_KEY: ${OLLAMA_API_KEY}" >> /tmp/hermes-secrets.yaml
          fi
          if [ -n "$DISCORD_BOT_TOKEN" ]; then
            echo "  DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}" >> /tmp/hermes-secrets.yaml
          fi
          if [ -n "$DISCORD_ALLOWED_USERS" ]; then
            echo "  DISCORD_ALLOWED_USERS: ${DISCORD_ALLOWED_USERS}" >> /tmp/hermes-secrets.yaml
          fi
          if [ -n "$DISCORD_HOME_CHANNEL" ]; then
            echo "  DISCORD_HOME_CHANNEL: ${DISCORD_HOME_CHANNEL}" >> /tmp/hermes-secrets.yaml
          fi

          kubectl apply -f /tmp/hermes-secrets.yaml
          rm -f /tmp/hermes-secrets.yaml

      - name: Restart deployment to pick up new config
        env:
          NS: ${{ steps.ns.outputs.namespace }}
        run: |
          if kubectl get statefulset hermes -n "$NS" >/dev/null 2>&1; then
            WORKLOAD=statefulset
          else
            WORKLOAD=deployment
          fi
          kubectl rollout restart $WORKLOAD/hermes -n "$NS"

      - name: Wait for deployment
        env:
          NS: ${{ steps.ns.outputs.namespace }}
        run: |
          if kubectl get statefulset hermes -n "$NS" >/dev/null 2>&1; then
            WORKLOAD=statefulset
          else
            WORKLOAD=deployment
          fi
          kubectl rollout status $WORKLOAD/hermes -n "$NS" --timeout=3m

      - name: Rollback on failure
        if: failure()
        env:
          NS: ${{ steps.ns.outputs.namespace }}
        run: |
          if kubectl get statefulset hermes -n "$NS" >/dev/null 2>&1; then
            WORKLOAD=statefulset
          else
            WORKLOAD=deployment
          fi
          echo "::error::Deployment failed — rolling back $NS"
          kubectl rollout undo $WORKLOAD/hermes -n "$NS" || true
          kubectl rollout status $WORKLOAD/hermes -n "$NS" --timeout=2m || true

      - name: Print access info
        env:
          NS: ${{ steps.ns.outputs.namespace }}
        run: |
          echo "## 🚀 Agent deployed: ${{ matrix.overlay }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Overlay | \`${{ matrix.overlay }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`$NS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Model | \`${{ steps.model.outputs.model }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Persona | \`(see SOUL.md)\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Connect" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl port-forward svc/hermes 8642:8642 -n $NS" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Teardown overlay from k3s
  # ============================================
  teardown:
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'teardown'
    strategy:
      matrix:
        overlay: ${{ fromJson(needs.detect.outputs.overlays) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract namespace from overlay
        id: ns
        run: |
          NAMESPACE=$(grep '^namespace:' overlays/${{ matrix.overlay }}/kustomization.yaml | awk '{print $2}')
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: '--accept-routes --accept-dns'

      - name: Setup kubectl
        uses: azure/k8s-set-context@v1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Delete namespace
        env:
          NS: ${{ steps.ns.outputs.namespace }}
        run: |
          echo "🗑️ Tearing down ${{ matrix.overlay }} (namespace: $NS)"
          kubectl delete namespace "$NS" --wait=true

      - name: Confirm deletion
        env:
          NS: ${{ steps.ns.outputs.namespace }}
        run: |
          if kubectl get namespace "$NS" &>/dev/null; then
            echo "::error::Namespace $NS still exists"
            exit 1
          else
            echo "✅ Namespace $NS deleted"
          fi

      - name: Print summary
        run: |
          echo "## 🗑️ Agent removed: ${{ matrix.overlay }}" >> $GITHUB_STEP_SUMMARY
          echo "Namespace \`${{ steps.ns.outputs.namespace }}\` deleted." >> $GITHUB_STEP_SUMMARY
